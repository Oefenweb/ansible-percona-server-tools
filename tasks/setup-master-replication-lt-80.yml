# tasks file
---
- name: setup master replication | check service
  ansible.builtin.service:
    name: mysql
    state: started
  tags:
    - percona-server-tools-setup-master-replication-lt-80-check-service

- name: setup master replication | part 1
  when: inventory_hostname == percona_server_tools_setup_master_replication.inventory.master1
  block:
    - name: setup master replication | part 1 | remove (backup) directory
      ansible.builtin.file:
        path: "{{ percona_server_tools_setup_master_replication.xtrabackup.backup_dir }}"
        state: absent
      tags:
        - percona-server-tools-setup-master-replication-lt-80-remove-backup-directory

    - name: setup master replication | part 1 | make a backup
      ansible.builtin.shell: >
        ulimit -n {{ percona_server_tools_ulimit }} && \
        innobackupex \
          --no-timestamp \
          {% if percona_server_tools_setup_master_replication.xtrabackup.user is defined %}--user={{ percona_server_tools_setup_master_replication.xtrabackup.user }}{% endif %} \
          {% if percona_server_tools_setup_master_replication.xtrabackup.password is defined %}--password='{{ percona_server_tools_setup_master_replication.xtrabackup.password }}'{% endif %} \
          {% if percona_server_tools_setup_master_replication.xtrabackup.parallel is defined and percona_server_tools_setup_master_replication.xtrabackup.parallel > 1 %}--parallel={{ percona_server_tools_setup_master_replication.xtrabackup.parallel }}{% endif %} \
          {% if percona_server_tools_setup_master_replication.xtrabackup.rsync is defined and percona_server_tools_setup_master_replication.xtrabackup.rsync %}--rsync{% endif %} \
          {{ percona_server_tools_setup_master_replication.xtrabackup.backup_dir }}
      register: _make_a_backup
      failed_when: "_make_a_backup.rc != 0 or _make_a_backup.stderr.split('\n')[-1].find('completed OK') == -1"
      changed_when: true
      tags:
        - percona-server-tools-setup-master-replication-lt-80-make-a-backup

    - name: setup master replication | part 1 | prepare the backup
      ansible.builtin.shell: >
        ulimit -n {{ percona_server_tools_ulimit }} && \
        innobackupex \
          --apply-log \
          {% if percona_server_tools_setup_master_replication.xtrabackup.user is defined %}--user={{ percona_server_tools_setup_master_replication.xtrabackup.user }}{% endif %} \
          {% if percona_server_tools_setup_master_replication.xtrabackup.password is defined %}--password='{{ percona_server_tools_setup_master_replication.xtrabackup.password }}'{% endif %} \
          {% if percona_server_tools_setup_master_replication.xtrabackup.use_memory is defined %}--use-memory={{ percona_server_tools_setup_master_replication.xtrabackup.use_memory }}{% endif %} \
          {{ percona_server_tools_setup_master_replication.xtrabackup.backup_dir }}
      register: _prepare_a_backup
      failed_when: "_prepare_a_backup.rc != 0 or _prepare_a_backup.stderr.split('\n')[-1].find('completed OK') == -1"
      changed_when: true
      tags:
        - percona-server-tools-setup-master-replication-lt-80-prepare-the-backup

- name: setup master replication | part 2
  when: inventory_hostname == percona_server_tools_setup_master_replication.inventory.master2
  block:
    - name: setup master replication | part 2 | get datadir
      community.mysql.mysql_variables:
        variable: datadir
      register: _datadir_value
      tags:
        - percona-server-tools-setup-master-replication-lt-80-get-datadir

    - name: setup master replication | part 2 | set datadir
      ansible.builtin.set_fact:
        percona_server_tools_datadir: "{{ _datadir_value.msg }}"
      tags:
        - percona-server-tools-setup-master-replication-lt-80-set-datadir

    - name: setup master replication | part 2 | stop slave
      community.mysql.mysql_replication:
        mode: stopreplica
      tags:
        - percona-server-tools-setup-master-replication-lt-80-stop-slave

    - name: setup master replication | part 2 | reset slave
      community.mysql.mysql_replication:
        mode: resetreplicaall
      tags:
        - percona-server-tools-setup-master-replication-lt-80-reset-slave

    - name: setup master replication | part 2 | stop service
      ansible.builtin.service:
        name: mysql
        state: stopped
      tags:
        - percona-server-tools-setup-master-replication-lt-80-stop-service

    - name: setup master replication | part 2 | purge datadir
      ansible.builtin.file:
        path: "{{ percona_server_tools_datadir.rstrip('/') }}"
        state: absent
      tags:
        - percona-server-tools-setup-master-replication-lt-80-purge-datadir

    - name: setup master replication | part 2 | create datadir
      ansible.builtin.file:
        path: "{{ percona_server_tools_datadir.rstrip('/') }}"
        state: directory
        mode: '0755'
      tags:
        - percona-server-tools-setup-master-replication-lt-80-create-datadir

    - name: setup master replication | part 2 | pull backup (rsync)  # noqa command-instead-of-module
      ansible.builtin.command: >
        rsync
        -ai --delete
        -e 'ssh{% if percona_server_tools_setup_master_replication.ssh_opts is defined %} {{ percona_server_tools_setup_master_replication.ssh_opts | join(" ") }}{% endif %}'
        {{ percona_server_tools_setup_master_replication.master1.host }}:{{ percona_server_tools_setup_master_replication.xtrabackup.backup_dir }}/
        {{ percona_server_tools_datadir.rstrip('/') }}
      register: _pull_backup
      changed_when: _pull_backup.stdout_lines | length > 0
      when: >
        percona_server_tools_setup_master_replication.transport is undefined or
        percona_server_tools_setup_master_replication.transport.method is undefined or
        percona_server_tools_setup_master_replication.transport.method == 'rsync'
      tags:
        - percona-server-tools-setup-master-replication-lt-80-pull-backup

    - name: setup master replication | part 2 | pull backup (tar)  # noqa risky-shell-pipe
      ansible.builtin.shell: >
        ssh{% if percona_server_tools_setup_master_replication.ssh_opts is defined %} {{ percona_server_tools_setup_master_replication.ssh_opts | join(" ") }}{% endif %} {{ percona_server_tools_setup_master_replication.master1.host }} \
        'tar -cf - -C {{ percona_server_tools_setup_master_replication.xtrabackup.backup_dir }} . {{ percona_server_tools_setup_master_replication.transport.pre | default('') }}' \
        {{ percona_server_tools_setup_master_replication.transport.post | default('') }} | tar -xf - -C {{ percona_server_tools_datadir.rstrip('/') }}
      register: _pull_backup
      changed_when: true
      when:
        - percona_server_tools_setup_master_replication.transport is defined
        - percona_server_tools_setup_master_replication.transport.method is defined
        - percona_server_tools_setup_master_replication.transport.method == 'tar'
      tags:
        - percona-server-tools-setup-master-replication-lt-80-pull-backup

    - name: setup master replication | part 2 | set permissions
      ansible.builtin.file:
        path: "{{ percona_server_tools_datadir.rstrip('/') }}"
        owner: "{{ percona_server_tools_mysqld_user }}"
        group: "{{ percona_server_tools_mysqld_user }}"
        recurse: true
      tags:
        - percona-server-tools-setup-master-replication-lt-80-set-permissions

    - name: setup master replication | part 2 | stat debian.cnf
      ansible.builtin.stat:
        path: "{{ percona_server_tools_debian_cnf_file }}"
      register: _stat_debian_cnf
      tags:
        - percona-server-tools-setup-master-replication-lt-80-stat-debian.cnf

    - name: setup master replication | part 2 | pull debian.cnf  # noqa command-instead-of-module
      ansible.builtin.command: >
        rsync
        -ai --checksum --delete
        -e ssh
        {{ percona_server_tools_setup_master_replication.master1.host }}:{{ percona_server_tools_debian_cnf_file }}
        {{ percona_server_tools_debian_cnf_file }}
      register: _pull_debian_cnf
      changed_when: _pull_debian_cnf.stdout_lines | length > 0
      when: _stat_debian_cnf.stat.exists
      tags:
        - percona-server-tools-setup-master-replication-lt-80-pull-debian.cnf

    - name: setup master replication | part 2 | start service
      ansible.builtin.service:
        name: mysql
        state: started
      tags:
        - percona-server-tools-setup-master-replication-lt-80-start-service

    - name: setup master replication | part 2 | set offline_mode to 1 (online)
      community.mysql.mysql_variables:
        variable: offline_mode
        value: '0'
      tags:
        - percona-server-tools-setup-master-replication-lt-80-set-offline_mode

    - name: setup master replication | part 2 | get master
      ansible.builtin.command: >
        cat {{ percona_server_tools_datadir.rstrip('/') }}/xtrabackup_binlog_info
      register: _master1_log_information
      changed_when: false
      tags:
        - percona-server-tools-setup-master-replication-lt-80-get-master

    - name: setup master replication | part 2 | change master
      community.mysql.mysql_replication:
        mode: changeprimary
        primary_host: "{{ percona_server_tools_setup_master_replication.master1.host }}"
        primary_user: "{{ percona_server_tools_setup_master_replication.master1.user }}"
        primary_password: "{{ percona_server_tools_setup_master_replication.master1.password }}"
        primary_log_file: "{{ _master1_log_information.stdout.split()[0] }}"
        primary_log_pos: "{{ _master1_log_information.stdout.split()[1] }}"
      tags:
        - percona-server-tools-setup-master-replication-lt-80-change-master

    - name: setup master replication | part 2 | start slave
      community.mysql.mysql_replication:
        mode: startreplica
      tags:
        - percona-server-tools-setup-master-replication-lt-80-start-slave

    - name: setup master replication | part 2 | get slave
      community.mysql.mysql_replication:
        mode: getreplica
      register: _slave2_information
      failed_when: _slave2_information.Replica_IO_Running != 'Yes' or _slave2_information.Replica_SQL_Running != 'Yes'
      tags:
        - percona-server-tools-setup-master-replication-lt-80-get-slave

- name: setup master replication | part 3
  when: inventory_hostname == percona_server_tools_setup_master_replication.inventory.master1
  block:
    - name: setup master replication | part 3 | get master
      community.mysql.mysql_replication:
        mode: getprimary
        login_host: "{{ percona_server_tools_setup_master_replication.master2.host }}"
        login_user: "{{ percona_server_tools_setup_master_replication.master2.user | default(percona_server_tools_setup_master_replication.master1.user) }}"
        login_password: "{{ percona_server_tools_setup_master_replication.master2.password | default(percona_server_tools_setup_master_replication.master1.password) }}"
      register: _master2_log_information
      tags:
        - percona-server-tools-setup-master-replication-lt-80-get-master

    - name: setup master replication | part 3 | stop slave
      community.mysql.mysql_replication:
        mode: stopreplica
      tags:
        - percona-server-tools-setup-master-replication-lt-80-stop-slave

    - name: setup master replication | part 3 | reset slave
      community.mysql.mysql_replication:
        mode: resetreplicaall
      tags:
        - percona-server-tools-setup-master-replication-lt-80-reset-slave

    - name: setup master replication | part 3 | change master
      community.mysql.mysql_replication:
        mode: changeprimary
        primary_host: "{{ percona_server_tools_setup_master_replication.master2.host }}"
        primary_user: "{{ percona_server_tools_setup_master_replication.master2.user | default(percona_server_tools_setup_master_replication.master1.user) }}"
        primary_password: "{{ percona_server_tools_setup_master_replication.master2.password | default(percona_server_tools_setup_master_replication.master1.password) }}"
        primary_log_file: "{{ _master2_log_information.File }}"
        primary_log_pos: "{{ _master2_log_information.Position }}"
      tags:
        - percona-server-tools-setup-master-replication-lt-80-change-master

    - name: setup master replication | part 3 | start slave
      community.mysql.mysql_replication:
        mode: startreplica
      tags:
        - percona-server-tools-setup-master-replication-lt-80-start-slave

    - name: setup master replication | part 3 | get slave
      community.mysql.mysql_replication:
        mode: getreplica
      register: _slave1_information
      failed_when: _slave1_information.Replica_IO_Running != 'Yes' or _slave1_information.Replica_SQL_Running != 'Yes'
      tags:
        - percona-server-tools-setup-master-replication-lt-80-get-slave
